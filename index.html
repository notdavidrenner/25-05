<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ One Month ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="flower-container"></div>

    <div class="card">

        <div id="content">

            <p class="line">
                It's been a month since we met (again)
            </p>

            <p class="line hidden" id="line2">
                and I still kinda fancy you
            </p>

            <p class="line hidden" id="line3">
                wonder if the feeling is mutual?
            </p>

            <div id="buttons" class="hidden">
                <button onclick="yesClicked()">YES</button>
                <button onclick="noClicked()">NO</button>
            </div>

        </div>

    </div>

    <audio id="song">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
</html>
